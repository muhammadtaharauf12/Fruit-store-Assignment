<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | FreshMart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="user-profile">
                <div class="avatar">👤</div>
                <div class="user-info">
                    <h4 id="displayUserName">User Name</h4>
                    <p id="displayUserEmail">user@example.com</p>
                </div>
            </div>
            <!-- home.html mein is tarah likhein -->
<div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search fresh fruits..." onkeyup="searchFruits()">
    <span class="search-icon"><svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg></span>
<div class="user-actions">

                <div class="cart-pill">

                    <span>🛒</span>

                    <span id="cartCount">0</span> Items

                </div>

            </div>



</div>
        </div>
        
        
    </nav>

    <main class="container">
        <header class="main-header">
            <h2>Explore Fresh Fruits</h2>
            <p>Directly from the farm to your doorstep</p>
        </header>

        <div id="fruitGrid" class="fruit-grid">
            <!-- Cards will appear here -->
        </div>
    </main>

    <script src="script.js"></script>
    <!-- Modal Screen (Shuru mein hidden hogi) -->
<div id="productModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalData">
            <!-- JavaScript yahan data bharega -->
        </div>
    </div>
</div>
</body>
</html>
